<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>층별 현황</title>
    <link rel="stylesheet" href="../css/floordashboard.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>

    <!-- 알림 상세 팝업 -->
    <div id="notif-overlay" class="notif-overlay hidden">
      <div class="notif-popup">
        <div class="notif-popup-header">
          <span class="notif-popup-title">⚠ 알림</span>
          <button class="notif-close" type="button" onclick="closeFloorNotifPopup()">✕</button>
        </div>

        <div class="notif-popup-body" id="notif-popup-body"></div>

        <div class="notif-popup-footer">
          <button class="btn-go" id="notif-go-btn" type="button" onclick="goToFloorCamera()">
            해당 카메라로 이동
          </button>
          <button class="btn-cancel" type="button" onclick="closeFloorNotifPopup()">닫기</button>
        </div>
      </div>
    </div>



    <!-- CCTV 확대 팝업 -->
    <div id="camera-preview-overlay" class="camera-preview-overlay hidden">
      <div class="camera-preview-popup">
        <div class="camera-preview-header">
          <div>
            <div class="camera-preview-title">CCTV 확대 보기</div>
            <div class="camera-preview-subtitle" id="camera-preview-subtitle">카메라를 선택하세요</div>
          </div>
          <button class="camera-preview-close" type="button" onclick="closeCameraPreviewPopup()">✕</button>
        </div>

        <div class="camera-preview-body">
          <div class="camera-preview-screen" id="camera-preview-screen">
            <div class="camera-preview-tag" id="camera-preview-tag">—</div>
            <div class="camera-preview-live">● LIVE</div>
            <span class="camera-preview-icon">
              <svg width="74" height="74" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
                <path d="M23 7l-7 5 7 5V7z"></path>
                <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
              </svg>
            </span>
            <div class="camera-preview-alert hidden" id="camera-preview-alert">신뢰도 하락 · 즉시 확인 필요</div>
            <div class="camera-preview-confidence" id="camera-preview-confidence">0%</div>
          </div>

          <div class="camera-preview-info">
            <div class="camera-preview-info-row"><span>위치</span><strong id="camera-preview-place">—</strong></div>
            <div class="camera-preview-info-row"><span>감지 인원</span><strong id="camera-preview-people">—</strong></div>
            <div class="camera-preview-info-row"><span>신뢰도</span><strong id="camera-preview-trust">—</strong></div>
            <div class="camera-preview-info-row"><span>상태</span><strong id="camera-preview-status">—</strong></div>
          </div>
        </div>
      </div>
    </div>


    <!-- 사이드바 -->
    <aside class="sidebar">
      <div class="sidebar-date">
        <div class="date-main" id="sidebar-date"></div>
        <div class="date-time" id="sidebar-time"></div>
      </div>

      <nav class="sidebar-nav">
        <a href="maindashboard.html" class="nav-item">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"></rect>
              <path d="M9 9h6M9 12h6M9 15h6"></path>
            </svg>
          </span>
          건물 현황
        </a>

        <a href="floordashboard.html" class="nav-item active">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
              <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
          </span>
          층별 현황
        </a>

        <a href="data.html" class="nav-item">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
            </svg>
          </span>
          데이터
        </a>

        <div class="nav-divider"></div>

        <a href="admin.html" class="nav-item">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            </svg>
          </span>
          관리자 설정
        </a>

        <div class="nav-divider"></div>

        <div class="nav-total">
          <span class="total-label">총원</span>
          <span class="total-badge" id="floor-total-badge">0명</span>
        </div>
      </nav>
    </aside>

    <!-- 메인 컨텐츠 -->
    <main class="main-content">

      <!-- 헤더 -->
      <header class="main-header">
        <div class="header-left">
          <h1 class="header-title">층별 현황</h1>
          <span class="status-chip" id="floorStatusChip">정상</span>
        </div>

        <div class="header-right">
          <div class="legend">
            <span class="legend-item"><span class="legend-dot red"></span>위험</span>
            <span class="legend-item"><span class="legend-dot yellow"></span>주의</span>
            <span class="legend-item"><span class="legend-dot green"></span>정상</span>
          </div>

          <button class="notif-bell" id="notif-bell" type="button" onclick="toggleFloorNotifList()">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <span class="bell-dot" id="bell-dot"></span>
          </button>

          <div class="notif-list hidden" id="notif-list">
            <div class="notif-list-header">알림 목록</div>
            <div id="notif-list-items"></div>
            <div class="notif-list-empty hidden" id="notif-list-empty">
              알림 없음
            </div>
          </div>
        </div>
      </header>

      <!-- 툴바 -->
      <section class="floor-toolbar">
        <div class="floor-tabs" id="floorTabs"></div>
        <div class="floor-summary">
          <div class="summary-card">
            <span class="summary-label">현재 층</span>
            <strong id="summary-floor">—</strong>
          </div>
          <div class="summary-card">
            <span class="summary-label">총 인원</span>
            <strong id="summary-people">—</strong>
          </div>
          <div class="summary-card">
            <span class="summary-label">카메라 수</span>
            <strong id="summary-cameras">—</strong>
          </div>
          <div class="summary-card">
            <span class="summary-label">주의/위험</span>
            <strong id="summary-alerts">—</strong>
          </div>
          <div class="summary-card danger">
            <span class="summary-label">주의 필요 인원</span>
            <strong id="summary-alert-people">—</strong>
          </div>
        </div>
      </section>

      <!-- 도면 카드 -->
      <section class="floor-layout-card">

        <!-- 헤더 행 -->
        <div class="layout-header">
          <div class="layout-header-left">
            <h2 id="layout-title">도면</h2>
            <p id="layout-subtitle">카메라를 클릭하면 상세 정보를 확인할 수 있습니다</p>
          </div>
          <div class="layout-header-right">
            <!-- 선택 카메라 인라인 박스 -->
            <button class="selected-inline" id="selectedInlineBox" type="button" onclick="openSelectedCameraPopup()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity:0.5;flex-shrink:0">
                <path d="M23 7l-7 5 7 5V7z"></path>
                <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
              </svg>
              <span class="selected-inline-id" id="selectedInlineId">—</span>
              <span class="selected-inline-meta" id="selectedInlineMeta">카메라를 선택하세요</span>
              <span class="selected-inline-status" id="selectedInlineStatus">—</span>
            </button>
          </div>
        </div>

        <!-- 본문 -->
        <div class="layout-body">

          <!-- 도면 -->
          <div class="floor-stage">
            <div class="floor-canvas" id="floorCanvas">
              <div class="floor-grid"></div>
              <div class="wall wall-top"></div>
              <div class="wall wall-left"></div>
              <div class="wall wall-right"></div>
              <div class="wall wall-bottom"></div>

              <div class="room room-a">회의실</div>
              <div class="room room-b">사무실 A</div>
              <div class="room room-c">사무실 B</div>
              <div class="room room-d">복도</div>
              <div class="room room-e">입구</div>

              <div id="cameraLayer"></div>
            </div>
          </div>

          <!-- 사이드 패널 -->
          <aside class="side-panel">

            <!-- 이 층 카메라 목록 -->
            <div class="panel-card" style="flex:1;min-height:0;display:flex;flex-direction:column;">
              <h3>카메라 목록</h3>
              <div class="camera-list" id="cameraList"></div>
            </div>

            <!-- 선택 카메라 상세 -->
            <div class="panel-card">
              <h3>상세 정보</h3>
              <div class="detail-rows" id="detailRows">
                <div class="detail-row">
                  <span class="detail-row-label">카메라 ID</span>
                  <span class="detail-row-value" id="detail-id">—</span>
                </div>
                <div class="detail-row">
                  <span class="detail-row-label">위치</span>
                  <span class="detail-row-value" id="detail-place">—</span>
                </div>
                <div class="detail-row">
                  <span class="detail-row-label">감지 인원</span>
                  <span class="detail-row-value" id="detail-people">—</span>
                </div>
                <div class="detail-row">
                  <span class="detail-row-label">신뢰도</span>
                  <span class="detail-row-value" id="detail-trust">—</span>
                </div>
                <div id="detail-status-wrap" style="margin-top:4px;">
                  <span class="detail-status-badge" id="detail-status">—</span>
                </div>
              </div>
            </div>

          </aside>
        </div>
      </section>

    </main>

    <script src="../js/floordashboard.js"></script>
  </body>
</html>
