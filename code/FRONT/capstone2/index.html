      }

        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;

        font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
        color: #222222;
      }

      .loading-box {
        text-align: center;
      }

      .loading-title {
