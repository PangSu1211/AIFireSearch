<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>건물 현황 모니터링</title>
    <link rel="stylesheet" href="../css/maindashboard.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- 알림 상세 팝업 -->
    <div id="notif-overlay" class="notif-overlay hidden">
      <div class="notif-popup">
        <div class="notif-popup-header">
          <span class="notif-popup-title">⚠ 알림</span>
          <button class="notif-close" onclick="closeNotifPopup()">✕</button>
        </div>

        <div class="notif-popup-body" id="notif-popup-body"></div>

        <div class="notif-popup-footer">
          <button class="btn-go" id="notif-go-btn" onclick="goToCamera()">
            해당 카메라로 이동
          </button>
          <button class="btn-cancel" onclick="closeNotifPopup()">닫기</button>
        </div>
      </div>
    </div>

    <!-- 사이드바 -->
    <aside class="sidebar">
      <div class="sidebar-date">
        <div class="date-main" id="sidebar-date"></div>
        <div class="date-time" id="sidebar-time"></div>
      </div>

      <nav class="sidebar-nav">
        <a href="maindashboard.html" class="nav-item active">
          <span class="nav-icon">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="3" y="3" width="18" height="18" rx="2" />
              <path d="M9 9h6M9 12h6M9 15h6" />
            </svg>
          </span>
          건물 현황
        </a>

        <a href="floordashboard.html" class="nav-item">
          <span class="nav-icon">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
              <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
          </span>
          층별 현황
        </a>

        <a href="data.html" class="nav-item">
          <span class="nav-icon">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
            </svg>
          </span>
          데이터
        </a>

        <div class="nav-divider"></div>

        <div class="nav-total">
          <span class="total-label">총원</span>
          <span class="total-badge" id="total-count">0명</span>
        </div>
      </nav>
    </aside>

    <!-- 메인 컨텐츠 -->
    <main class="main-content">
      <header class="main-header">
        <div class="header-left">
          <h1 class="header-title">건물 현황</h1>
          <span class="header-alert-badge" id="alert-badge" title="알림 있음">!</span>
        </div>

        <div class="header-right">
          <div class="floor-filter">
            <select id="floor-select" onchange="filterFloor(this.value)">
              <option value="all">전체 층</option>
            </select>
          </div>

          <button class="notif-bell" id="notif-bell" onclick="toggleNotifList()">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
            <span class="bell-dot" id="bell-dot"></span>
          </button>

          <div class="notif-list hidden" id="notif-list">
            <div class="notif-list-header">알림 목록</div>
            <div id="notif-list-items"></div>
            <div class="notif-list-empty hidden" id="notif-list-empty">
              알림 없음
            </div>
          </div>
        </div>
      </header>

      <section class="view active" id="view-building">
        <div class="camera-grid" id="camera-grid"></div>
      </section>
    </main>

    <script src="../js/maindashboard.js"></script>
  </body>
</html>
