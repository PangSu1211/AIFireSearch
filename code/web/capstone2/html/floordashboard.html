<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>층별 현황</title>
    <link rel="stylesheet" href="../css/floordashboard.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>

    <!-- 사이드바 -->
    <aside class="sidebar">
      <div class="sidebar-date">
        <div class="date-main" id="sidebar-date"></div>
        <div class="date-time" id="sidebar-time"></div>
      </div>

      <nav class="sidebar-nav">
        <a href="maindashboard.html" class="nav-item">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"></rect>
              <path d="M9 9h6M9 12h6M9 15h6"></path>
            </svg>
          </span>
          건물 현황
        </a>

        <a href="floordashboard.html" class="nav-item active">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
              <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
          </span>
          층별 현황
        </a>

        <a href="data.html" class="nav-item">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
            </svg>
          </span>
          데이터
        </a>

        <div class="nav-divider"></div>

        <div class="nav-total">
          <span class="total-label">총원</span>
          <span class="total-badge" id="floor-total-badge">0명</span>
        </div>
      </nav>
    </aside>

    <!-- 메인 컨텐츠 -->
    <main class="main-content">

      <!-- 헤더 -->
      <header class="main-header">
        <div class="header-left">
          <h1 class="header-title">층별 현황</h1>
          <span class="status-chip" id="floorStatusChip">정상</span>
        </div>

        <div class="header-right">
          <div class="legend">
            <span class="legend-item"><span class="legend-dot red"></span>위험</span>
            <span class="legend-item"><span class="legend-dot yellow"></span>주의</span>
            <span class="legend-item"><span class="legend-dot green"></span>정상</span>
          </div>
        </div>
      </header>

      <!-- 툴바 -->
      <section class="floor-toolbar">
        <div class="floor-tabs" id="floorTabs"></div>
        <div class="floor-summary">
          <div class="summary-card">
            <span class="summary-label">현재 층</span>
            <strong id="summary-floor">—</strong>
          </div>
          <div class="summary-card">
            <span class="summary-label">총 인원</span>
            <strong id="summary-people">—</strong>
          </div>
          <div class="summary-card">
            <span class="summary-label">카메라 수</span>
            <strong id="summary-cameras">—</strong>
          </div>
          <div class="summary-card">
            <span class="summary-label">주의/위험</span>
            <strong id="summary-alerts">—</strong>
          </div>
          <div class="summary-card danger">
            <span class="summary-label">주의 필요 인원</span>
            <strong id="summary-alert-people">—</strong>
          </div>
        </div>
      </section>

      <!-- 도면 카드 -->
      <section class="floor-layout-card">

        <!-- 헤더 행 -->
        <div class="layout-header">
          <div class="layout-header-left">
            <h2 id="layout-title">도면</h2>
            <p id="layout-subtitle">카메라를 클릭하면 상세 정보를 확인할 수 있습니다</p>
          </div>
          <div class="layout-header-right">
            <!-- 선택 카메라 인라인 박스 -->
            <div class="selected-inline" id="selectedInlineBox">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity:0.5;flex-shrink:0">
                <path d="M23 7l-7 5 7 5V7z"></path>
                <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
              </svg>
              <span class="selected-inline-id" id="selectedInlineId">—</span>
              <span class="selected-inline-meta" id="selectedInlineMeta">카메라를 선택하세요</span>
              <span class="selected-inline-status" id="selectedInlineStatus">—</span>
            </div>
          </div>
        </div>

        <!-- 본문 -->
        <div class="layout-body">

          <!-- 도면 -->
          <div class="floor-stage">
            <div class="floor-canvas" id="floorCanvas">
              <div class="floor-grid"></div>
              <div class="wall wall-top"></div>
              <div class="wall wall-left"></div>
              <div class="wall wall-right"></div>
              <div class="wall wall-bottom"></div>

              <div class="room room-a">회의실</div>
              <div class="room room-b">사무실 A</div>
              <div class="room room-c">사무실 B</div>
              <div class="room room-d">복도</div>
              <div class="room room-e">입구</div>

              <div id="cameraLayer"></div>
            </div>
          </div>

          <!-- 사이드 패널 -->
          <aside class="side-panel">

            <!-- 이 층 카메라 목록 -->
            <div class="panel-card" style="flex:1;min-height:0;display:flex;flex-direction:column;">
              <h3>카메라 목록</h3>
              <div class="camera-list" id="cameraList"></div>
            </div>

            <!-- 선택 카메라 상세 -->
            <div class="panel-card">
              <h3>상세 정보</h3>
              <div class="detail-rows" id="detailRows">
                <div class="detail-row">
                  <span class="detail-row-label">카메라 ID</span>
                  <span class="detail-row-value" id="detail-id">—</span>
                </div>
                <div class="detail-row">
                  <span class="detail-row-label">위치</span>
                  <span class="detail-row-value" id="detail-place">—</span>
                </div>
                <div class="detail-row">
                  <span class="detail-row-label">감지 인원</span>
                  <span class="detail-row-value" id="detail-people">—</span>
                </div>
                <div class="detail-row">
                  <span class="detail-row-label">신뢰도</span>
                  <span class="detail-row-value" id="detail-trust">—</span>
                </div>
                <div id="detail-status-wrap" style="margin-top:4px;">
                  <span class="detail-status-badge" id="detail-status">—</span>
                </div>
              </div>
            </div>

          </aside>
        </div>
      </section>

    </main>

    <script src="../js/floordashboard.js"></script>
  </body>
</html>
